<script>

  function cadastrar() {

    // Agora vá para o método fetch logo abaixo
    var apelidoVar = apelido_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var personagemVar = personagem.value;

    personagemVar = Number(personagemVar)

    // Verificando se há algum campo em branco
    if (
      apelidoVar == "" ||
      emailVar == "" || 
      senhaVar == "" ||
      confirmacaoSenhaVar == "" ||
      personagemVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "Complete os campos";

      // finalizarAguardar();
      return false;
    }
    // validação de senha
    if (senhaVar != confirmacaoSenhaVar) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "As senhas não coincidem"
      return false
    }
    if(apelidoVar.length < 4){
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Apelido deve ter pelo menos 4 caracteres"
      return false
    }
    if(senhaVar.length < 8){
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Senha deve ter pelo menos 8 caracteres"
      return false
    }
    if (!emailVar.includes("@") || !emailVar.includes(".")){
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Email inválido"
      return false
    }
    else {
      // Timeout executa apenas uma vez
      setTimeout(sumirMensagem, 5000);
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        apelidoServer: apelidoVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        personagemServer: personagemVar
        // idUsuarioVincularServer: idUsuarioVincular
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });

    return false;
  }

  function limparFormulario() {
    apelido_input.value = "";
    email_input.value = "";
    senha_input.value = "";
    confirmacao_senha_input.value = "";
    personagem.value = "";
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
