<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css">
    <link rel="icon" href="../assets/icon/logo_sem_fundo.png">
    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body>

    <header>
        <div id="logo">
            <a href="../index.html"><img id="logo_coroa" src="../assets/icon/logo_sem_fundo.png"></a>
            <div class="logo_escrito">Entre Espinhos e Coroas</div>
        </div>

        <div>
            <a href="cadastro.html">
                <button class="button">Cadastro</button>
            </a>
            <a href="login.html">
                <button class="button">Login</button>
            </a>
        </div>
    </header>


    <div class="login">
        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>
        <div class="container">
            <div class="card card-login">
                <h2>Você já faz parte deste mundo!</h2>
                <div class="formulario">
                    <div class="campo">
                        <span>E-mail:</span>
                        <input id="email_input" type="text" placeholder="Login">
                    </div>
                    <div class="campo">
                        <span>Senha:</span>
                        <input id="senha_input" type="password" placeholder="******">
                    </div>
                    <button class="botao" onclick="entrar()">Entrar</button>
                </div>

                <div id="div_aguardar" class="loading-div">
                    <!-- <img src="./assets/circle-loading.gif" id="loading-gif"> -->
                </div>

                <div id="div_erros_login"></div>
            </div>
        </div>
    </div>

</html>

<script>

    var tentativas = 3;

    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;



        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setTimeout(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                // reseta as tentativas para entrar
                // tentativas = 3
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.apelido_USUARIO = json.apelido;
                    sessionStorage.ID_USUARIO = json.id;
                    // sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = "./dashboard/quiz.html";
                    }, 1000); // apenas para exibir o loading

                });
            }
            // else {
            //     // algoritmo
            //     tentativas--;

            //     if (tentativas != 0) {
            //         alert(`Houve um erro ao tentar realizar o login! Faltam ${tentativas} tentativas!`)
            //         console.log(`Houve um erro ao tentar realizar o login! Faltam ${tentativas} tentativas!`);
            //     }
            //     resposta.text().then(texto => {
            //         console.error(texto);
            //         finalizarAguardar(texto);
            //     });

            //     if (tentativas <= 0) {
            //         alert("Número de tentativas excedeu, você não pode entrar no mundo das fadas!")
            //     }
            // }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
