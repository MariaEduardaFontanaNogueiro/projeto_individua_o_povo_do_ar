    // KPI 1
    function mostrarPersonagemFavorito() {
        fetch("/dashboard/personagemFavorito")
        .then(res => res.json())
        .then(dados => {
            if(dados.length > 0){
                const personagem = dados[0];

                document.getElementById("nomePersonagem").innerHTML = personagem.nome;
                document.getElementById("imgPersonagem").src = personagem.imgPersonagem;
                document.getElementById("qtdFavoritos").innerHTML = personagem.total + " favoritos";
            }
        })
        .catch(erro => console.error("Erro: ", erro));
    }

    //KPI 2
    function mostrarRaca() {
        fetch("/dashboard/Raca")
        .then(res => res.json())
        .then(dados => {
            if(dados.length > 0){
                const raca = dados[0];

                document.getElementById("nomeRaca").innerHTML = raca.nome;
                document.getElementById("imgRaca").src = " " + raca.imgRaca;
                document.getElementById("qtdRaca").innerHTML = raca.total_escolhas + "% das pessoas tbm são";
            }
        })
        .catch(erro => console.error("Erro: ", erro));
    }

    // montar o grafico
    function criargraficoPersonagem(){
        // buscar recursos de forma assíncrona (q não acontecem imediatamente) através da rede
        fetch('/quiz/personagens')
        // then é chamado quando a promise é resolvida(onFulfilled)
        .then(res => res.json())
        // onde vai receber os dados do bd
        .then(dados => {
            // coloca em ordem crescente
            dados.sort((a, b) => b.quantidade -a.quantidade)
            // pega apenas os 4 primeiros
            dados = dados.slice(0, 4)

            let labels = [];
            let valores = [];
            let somaValores = 0;
            console.log(dados);
            
            dados.forEach(item => {
                labels.push(item.personagem);
                valores.push(item.quantidade);
                somaValores += item.quantidade;
            });

            let valoresPorcentagem = [];
            for (let i = 0; i < valores.length; i++) {
                let porcentagem = valores[i]/somaValores * 100;
                valoresPorcentagem.push(porcentagem)
            }

            new Chart(document.getElementById('graficoPersonagem'), {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Quantidade (%)',
                        data: valoresPorcentagem,
                        backgroundColor: [
                         '#5A0F0F', // fada (vermelho escuro com toque mágico)
                         '#4A0D0D', // elfo (vinho elegante)
                         '#6B0F0F', // duende (vermelho intenso)
                         '#3B0A0A', // humano (quase preto, mais sóbrio)
                         '#2A0505'  // realeza feérica (vermelho profundo extremo)
                        ],
                        borderColor: '#000000',
                        borderWidth: 2, // espessura da barra
                        borderRadius: 3,
                        barPercentage: 0.6, //largura da barra
                        categoryPercentage: 0.6 //espaço entre as barras
                    }]
                },
            })
        })
        .catch(function (error) {
                 console.error(`Erro: ${error.message}`);
             });
    }

    function criargraficoCriatura(){
        // buscar recursos de forma assíncrona (q não acontecem imediatamente) através da rede
        fetch('/quiz/criaturas')
        // then é chamado quando a promise é resolvida(onFulfilled)
        .then(res => res.json())
        // onde vai receber os dados do bd
        .then(dados => {

            // coloca em ordem crescente
            dados.sort((a, b) => b.quantidade -a.quantidade)
            // pega apenas os 3 primeiros
            dados = dados.slice(0, 3)

            let labels = [];
            let valores = [];
            console.log(dados);

            dados.forEach(item => {
                labels.push(item.criatura);
                valores.push(item.quantidade);
            });
            new Chart(document.getElementById('graficoCriatura'), {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'quantidade',
                        data: valores,
                        backgroundColor: [
                         '#5A0F0F', // fada (vermelho escuro com toque mágico)
                         '#4A0D0D', // elfo (vinho elegante)
                         '#6B0F0F', // duende (vermelho intenso)
                         '#3B0A0A', // humano (quase preto, mais sóbrio)
                         '#2A0505'  // realeza feérica (vermelho profundo extremo)
                        ],
                        borderColor: '#000000',
                        borderWidth: 2, // espessura da barra
                        borderRadius: 3,
                        barPercentage: 0.6, //largura da barra
                        categoryPercentage: 0.6 //espaço entre as barras
                    }]
                }
            })
        })
        .catch(function (error) {
                console.error(`Erro: ${error.message}`);
            });
    }
