<body>


    <div class="header-left dash-header">

            <a href="../index.html"><img id="logo_coroa_" src="../assets/icon/logo_sem_fundo.png"></a>
        </div>

        <div class="hello">
            <h3>Olá, <span id="b_usuario">usuário</span>!</h3>

        <div class="btn-nav">

        <div class="btn-nav-white">

        <div class="btn-nav-white">

        </div>

    <div class="janela">

        <button id="botao_iniciar" onclick="iniciarQuiz()">Iniciar o quiz</button>


        <div id="content" style="display: none;">

            <div class="container_quiz">

                <span id="questao_exibida"></span>
                <div id="opcoes"></div>

                <p id="mensagem"></p>


                <button id="botao_submeter" onclick="submeter()" style="display: none;">Responder</button>
            </div>
        </div>
    </div>
</body>

</html>

<script>

    function iniciarQuiz() {
        // esconde o botão quando quando inicia 
        document.getElementById("botao_iniciar").style.display = "none";
        // aparece o botão
        document.getElementById("botao_submeter").style.display = "block"
        document.getElementById("content").style.display = "block"

        // começa a mostrar as questões
        mostrarQuestao()
    }

    let respostas = []

    let indiceAtual = 0;

    function submeter() {
        // checked: quando a pessoa marca alguma alternativa o navegador da um checked no input para saber qual foi
        // a alternativa marcada.
        // quando eu coloco 'input[name="option"]:checked' peço apenas a opção que está marcada
        let selecionado = document.querySelector('input[name="option"]:checked');        

        // etra aqui se a pessoa não marcou nada
        if (!selecionado) {
            mensagem.innerHTML = "Escolha uma opção"
            return
        }

        respostas.push(selecionado.value)

        // vai para a próxima pergunta
        indiceAtual++;

        if (indiceAtual < listaDeQuestoes.length) {
            mostrarQuestao()
        } else {
            mostrarResultado();
        }
    }

    function mostrarQuestao() {
        opcoes.innerHTML = "";
        mensagem.innerHTML = ""

        document.getElementById("questao_exibida").innerHTML = listaDeQuestoes[indiceAtual].pergunta;
        console.log(document.getElementById("questao_exibida").innerHTML);

                                                        // para cada
        listaDeQuestoes[indiceAtual].opcoes.forEach(opcao => {
            opcoes.innerHTML += `
                <label><input type="radio" name="option" value="${opcao.tipo}">${opcao.texto}</label> <br>
                `
            console.log(listaDeQuestoes[indiceAtual].opcoes.forEach);

        })
    }
    const listaDeQuestoes = [
        {
            pergunta: "1. Em um conflito, você:",
            opcoes: [
                { texto: "Usa charme e manipulação", tipo: "Fada" },
                { texto: "Analisa e cria estratégia", tipo: "Elfo" },
                { texto: "Faz algo inesperado", tipo: "Duende" },
                { texto: "Resolve de forma direta", tipo: "Humano" },
                { texto: "Assume o controle da situação", tipo: "Realeza_Feerica" }]
        },
        {
            pergunta: "2. O que mais te define?",
            opcoes: [
                { texto: "Mistério", tipo: "Fada" },
                { texto: "Inteligência", tipo: "Elfo" },
                { texto: "Criatividade caótica", tipo: "Duende" },
                { texto: "Determinação", tipo: "Humano" },
                { texto: "Autoridade", tipo: "Realeza_Feerica" }]
        },
        {
            pergunta: "3. Seu maior defeito:",
            opcoes: [
                { texto: "Manipulador(a)", tipo: "Fada" },
                { texto: "Frio(a) demais", tipo: "Elfo" },
                { texto: "Impulsivo(a)", tipo: "Duende" },
                { texto: "Teimoso(a)", tipo: "Humano" },
                { texto: "Orgulhoso(a)", tipo: "Realeza_Feerica" }]
        },
        {
            pergunta: "4. Em grupo, você é:",
            opcoes: [
                { texto: "Quem influencia os outros", tipo: "Fada" },
                { texto: "O estrategista", tipo: "Elfo" },
                { texto: "O imprevisível", tipo: "Duende" },
                { texto: "O confiável", tipo: "Humano" },
                { texto: "O líder", tipo: "Realeza_Feerica" }]
        },

        {
            pergunta: "5. O que você mais valoriza?",
            opcoes: [
                { texto: "Poder psicológico", tipo: "Fada" },
                { texto: "Conhecimento", tipo: "Elfo" },
                { texto: "Liberdade", tipo: "Duende" },
                { texto: "Sobrevivência", tipo: "Humano" },
                { texto: "Poder e status", tipo: "Realeza_Feerica" }]
        },

        {
            pergunta: "6. Se alguém te trai:",
            opcoes: [
                { texto: "Manipula a situação a seu favor", tipo: "Fada" },
                { texto: "Planeja uma resposta inteligente", tipo: "Elfo" },
                { texto: "Reage de forma imprevisível", tipo: "Duende" },
                { texto: "Confronta diretamente", tipo: "Humano" },
                { texto: "Destrói a pessoa socialmente", tipo: "Realeza_Feerica" }]
        },

        {
            pergunta: "7. Seu ambiente ideal:",
            opcoes: [
                { texto: "Um lugar mágico e misterioso", tipo: "Fada" },
                { texto: "Uma biblioteca ou reino antigo", tipo: "Elfo" },
                { texto: "Um lugar caótico e divertido", tipo: "Duende" },
                { texto: "Um lugar simples e seguro", tipo: "Humano" },
                { texto: "Um palácio luxuoso", tipo: "Realeza_Feerica" }]
        },
    ]

    let id_usuario = sessionStorage.ID_USUARIO;

    function mostrarResultado(idUsuario) {
        let contagem = []

        respostas.forEach(tipo => {
            let achou = contagem.find(item => item.tipo === tipo);

            if(achou) {
                achou.quantidade++;
            } else {
                contagem.push({ tipo: tipo, quantidade: 1})
            }
        });

        let resultado = contagem.reduce((maior, atual) => {
            return atual.quantidade > maior.quantidade ? atual : maior;
        });

        let tipoFinal = resultado.tipo
        
        let textoResultado = ""

        // mostra para o usuário quem ele é (teste de personalidade)
        if (tipoFinal == "Fada") {
            textoResultado = "Você é uma Fada encantadora, misteriosa e sempre um passo à frente. Seu poder está na mente e no charme que poucos conseguem resistir.";
            tipoFinal = 1
        } else if (tipoFinal == "Elfo") {
            textoResultado = "Você é um Elfo inteligente, estratégico e observador. Enquanto outros agem, você já previu o resultado.";
            tipoFinal = 2
        } else if (tipoFinal == "Duende") {
            textoResultado = "Você é um Duende caótico, criativo e impossível de prever. Sua força está no inesperado.";
            tipoFinal = 3
        } else if (tipoFinal == "Humano") {
            textoResultado = "Você é um Humano resiliente, determinado e realista. Mesmo sem magia, você nunca desiste.";
            tipoFinal = 4
        } else if (tipoFinal == "Realeza_Feerica") {
            textoResultado = "Você é da Realeza Feérica poderoso, imponente e feito para liderar. Onde você chega, todos sentem sua presença.";
            tipoFinal = 5
        }

        // some com o resto dos textos e botão
        // opcoes.innerHTML = "";
        document.getElementById("questao_exibida").innerHTML = textoResultado;
        document.getElementById("opcoes").innerHTML = "";
        document.getElementById("botao_submeter").style.display = "none";

        

        // enviar para o backend
        fetch("/quiz/cadastrarraca", {
            method: "post",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                id_usuarioServer:id_usuario,
                racaServer: tipoFinal
            })
        })
            .then(res => res.text())
            .then(msg => {
                console.log("Cadastrado Com sucesso");
            })
            .catch(erro => console.error(erro));
    }

</script>

<script>
    b_usuario.innerHTML = sessionStorage.apelido_USUARIO;
